<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shakawat Huzur | Modern Exam and Admission Portal</title>
    <style>
        /* ==================== CSS STYLES ==================== */
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            /* Animated Unique Gradient Background */
            background: linear-gradient(-45deg, #12c2e9, #c471ed, #f64f59, #4b6cb7);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            min-height: 100vh;
            color: #ffffff;
            overflow-x: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Glassmorphism Navigation */
        nav {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.2);
            position: sticky;
            top: 20px;
            z-index: 1000;
            max-width: 900px;
            margin: 20px auto;
            border-radius: 50px;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: #ffffff;
            text-decoration: none;
            letter-spacing: 1px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }

        .nav-links a {
            text-decoration: none;
            color: #ffffff;
            margin-left: 10px;
            padding: 8px 20px;
            font-weight: 600;
            border-radius: 30px;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .nav-links a:hover, .nav-links a.active {
            background: rgba(255, 255, 255, 0.25);
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        /* Main Layout */
        .container {
            max-width: 1000px;
            margin: 60px auto;
            padding: 0 20px;
            text-align: center;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            text-shadow: 0 4px 10px rgba(0,0,0,0.3);
            animation: fadeInDown 0.8s ease;
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 50px;
            font-size: 1.2rem;
            font-weight: 300;
            letter-spacing: 1px;
            animation: fadeIn 1s ease;
        }

        /* Glassmorphism Cards */
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 25px;
            justify-content: center;
            animation: fadeInUp 0.8s ease;
        }

        .btn-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 35px 20px;
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.2);
            text-decoration: none;
            color: #ffffff;
            font-weight: 600;
            font-size: 1.3rem;
            transition: all 0.4s ease;
            cursor: pointer;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        .btn-card:hover {
            transform: translateY(-10px);
            background: rgba(255, 255, 255, 0.25);
            box-shadow: 0 15px 40px 0 rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        /* Back Button */
        .back-btn {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            color: white;
            padding: 10px 25px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            font-size: 1rem;
            transition: 0.3s;
            margin-bottom: 20px;
            display: inline-block;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateX(-5px);
        }
        
        .header-section {
            position: relative;
            margin-bottom: 40px;
        }

        .back-wrapper {
            position: absolute;
            left: 0;
            top: 10px;
        }

        /* Pages Wrapper */
        .page {
            display: none;
            animation: fadeIn 0.5s ease;
        }

        .page.active {
            display: block;
        }

        /* Responsive */
        @media (max-width: 768px) {
            h1 { font-size: 2.2rem; }
            nav { 
                flex-direction: column; 
                gap: 15px; 
                border-radius: 20px;
                padding: 1rem;
                margin: 15px;
            }
            .nav-links {
                display: flex;
                flex-wrap: wrap;
                justify-content: center;
                gap: 10px;
            }
            .nav-links a { margin: 0; }
            .back-wrapper { position: static; margin-bottom: 20px; text-align: left; }
        }

        /* Animations */
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-30px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <nav>
        <a href="#" onclick="showPage('home')" class="logo">EduLearn</a>
        <div class="nav-links">
            <a onclick="showPage('home')" id="nav-home" class="active">Home</a>
            <a onclick="showPage('admission')" id="nav-admission">Admission</a>
            <a onclick="showPage('exam')" id="nav-exam">Exam</a>
        </div>
    </nav>

    <div id="home" class="page container active">
        <h1>Welcome to EduLearn</h1>
        <p class="subtitle">Select your portal to continue</p>
        
        <div class="card-grid">
            <button class="btn-card" onclick="showPage('admission')">🎓 Admission Portal</button>
            <button class="btn-card" onclick="showPage('exam')">📝 Exam Portal</button>
        </div>
    </div>

    <div id="admission" class="page container">
        <div class="header-section">
            <div class="back-wrapper">
                <button class="back-btn" onclick="goBackAdmission()">&#8592; Back</button>
            </div>
            <h1 id="admission-title">Admission Form</h1>
            <p class="subtitle" id="admission-subtitle">Select your class to apply</p>
        </div>

        <div class="card-grid" id="admission-step-1">
            <button class="btn-card" onclick="selectAdmissionClass(6)">Class 6</button>
            <button class="btn-card" onclick="selectAdmissionClass(7)">Class 7</button>
            <button class="btn-card" onclick="selectAdmissionClass(8)">Class 8</button>
            <button class="btn-card" onclick="selectAdmissionClass(9)">Class 9</button>
            <button class="btn-card" onclick="selectAdmissionClass(10)">Class 10</button>
        </div>

        <div class="card-grid" id="admission-step-2" style="display: none;"></div>
    </div>

    <div id="exam" class="page container">
        <div class="header-section">
            <div class="back-wrapper">
                <button class="back-btn" onclick="goBackExam()">&#8592; Back</button>
            </div>
            <h1 id="exam-title">Take an Exam</h1>
            <p class="subtitle" id="exam-subtitle">Select your Class</p>
        </div>

        <div class="card-grid" id="exam-step-1">
            <button class="btn-card" onclick="selectExamClass(6)">Class 6</button>
            <button class="btn-card" onclick="selectExamClass(7)">Class 7</button>
            <button class="btn-card" onclick="selectExamClass(8)">Class 8</button>
            <button class="btn-card" onclick="selectExamClass(9)">Class 9</button>
            <button class="btn-card" onclick="selectExamClass(10)">Class 10</button>
        </div>

        <div class="card-grid" id="exam-step-2" style="display: none;"></div>

        <div class="card-grid" id="exam-step-3" style="display: none;"></div>
    </div>

    <script>
        /* ==================== JAVASCRIPT ==================== */

        // 1. NAVIGATION FUNCTION
        function showPage(pageId) {
            // Hide all pages
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            // Show selected page
            document.getElementById(pageId).classList.add('active');
            
            // Update Nav Links
            document.querySelectorAll('.nav-links a').forEach(a => a.classList.remove('active'));
            document.getElementById('nav-' + pageId).classList.add('active');
            
            // Reset Flows
            if(pageId === 'exam') resetExamFlow();
            if(pageId === 'admission') resetAdmissionFlow();
        }

        // ==================== ADMISSION LOGIC ====================
        // ADD YOUR GOOGLE FORM LINKS FOR ADMISSION HERE
        const admissionData = {
            6: [
                { name: "Apply Now", link: "https://forms.gle/UdVhPJgp526hpR2Y7" }
            ],
            7: [
                { name: "Apply Now", link: "https://forms.gle/g5n3e3vrTCErFypFA" }
            ],
            8: [
                { name: "Apply Now", link: "https://forms.gle/NnuJx4E1Kzw8cysV9" }
            ],
            9: [
                { name: "Science Group", link: "https://forms.gle/MNTHNdPNNiVYNLbT7" },
                { name: "Arts Group", link: "https://forms.gle/MNTHNdPNNiVYNLbT7" },
                { name: "Commerce Group", link: "https://forms.gle/MNTHNdPNNiVYNLbT7" }
            ],
            10: [
                { name: "Science Group", link: "https://forms.gle/1CFv16S8qzPTqg7s7" },
                { name: "Arts Group", link: "https://forms.gle/1CFv16S8qzPTqg7s7" },
                { name: "Commerce Group", link: "https://forms.gle/1CFv16S8qzPTqg7s7" }
            ]
        };

        let currentAdmissionClass = null;

        function selectAdmissionClass(classNum) {
            currentAdmissionClass = classNum;
            
            document.getElementById('admission-step-1').style.display = 'none';
            document.getElementById('admission-step-2').style.display = 'grid';
            
            document.getElementById('admission-title').innerText = "Class " + classNum + " Admission";
            document.getElementById('admission-subtitle').innerText = "Select Option to Apply";
            
            const forms = admissionData[classNum];
            const container = document.getElementById('admission-step-2');
            container.innerHTML = '';
            
            forms.forEach(form => {
                container.innerHTML += `<a href="${form.link}" class="btn-card" target="_blank">${form.name}</a>`;
            });
        }

        function goBackAdmission() {
            if(document.getElementById('admission-step-2').style.display === 'grid') {
                resetAdmissionFlow();
            } else {
                showPage('home');
            }
        }

        function resetAdmissionFlow() {
            document.getElementById('admission-step-1').style.display = 'grid';
            document.getElementById('admission-step-2').style.display = 'none';
            document.getElementById('admission-title').innerText = "Admission Form";
            document.getElementById('admission-subtitle').innerText = "Select your class to apply";
        }


        // ==================== EXAM LOGIC ====================
        // ADD YOUR GOOGLE FORM LINKS FOR EXAMS HERE
        const examData = {
            6: {
                Bangla: [{ name: "Class 6 Bangla - Mid", link: "https://forms.google.com/your-link" }],
                English: [{ name: "Class 6 English - Mid", link: "https://forms.google.com/your-link" }],
                Math: [{ name: "Class 6 Math - Final", link: "https://forms.google.com/your-link" }],
                Science: [{ name: "Class 6 Science - Quiz", link: "https://forms.google.com/your-link" }]
            },
            7: {
                Bangla: [{ name: "Class 7 Bangla - Mid", link: "https://forms.google.com/your-link" }],
                English: [{ name: "Class 7 English - Mid", link: "https://forms.google.com/your-link" }],
                Math: [{ name: "Class 7 Math - Final", link: "https://forms.google.com/your-link" }],
                Science: [{ name: "Class 7 Science - Quiz", link: "https://forms.google.com/your-link" }]
            },
            8: {
                Bangla: [{ name: "Class 8 Bangla - Mid", link: "https://forms.google.com/your-link" }],
                English: [{ name: "Class 8 English - Mid", link: "https://forms.google.com/your-link" }],
                Math: [{ name: "Class 8 Math - Final", link: "https://forms.google.com/your-link" }],
                Science: [{ name: "Class 8 Science - Quiz", link: "https://forms.google.com/your-link" }]
            },
            9: {
                Bangla: [{ name: "Class 9 Bangla - Mid", link: "https://forms.google.com/your-link" }],
                English: [{ name: "Class 9 English - Mid", link: "https://forms.google.com/your-link" }],
                Math: [{ name: "Class 9 Math - Final", link: "https://forms.google.com/your-link" }],
                Science: [{ name: "Class 9 Science - Quiz", link: "https://forms.google.com/your-link" }]
            },
            10: {
                Bangla: [{ name: "Class 10 Bangla - Mid", link: "https://forms.google.com/your-link" }],
                English: [{ name: "Class 10 English - Mid", link: "https://forms.google.com/your-link" }],
                Math: [{ name: "Class 10 Math - Final", link: "https://forms.google.com/your-link" }],
                Science: [{ name: "Class 10 Science - Quiz", link: "https://forms.google.com/your-link" }]
            }
        };

        let currentClass = null;

        function selectExamClass(classNum) {
            currentClass = classNum;
            
            document.getElementById('exam-step-1').style.display = 'none';
            document.getElementById('exam-step-2').style.display = 'grid';
            
            document.getElementById('exam-title').innerText = "Class " + classNum;
            document.getElementById('exam-subtitle').innerText = "Select Subject";
            
            const subjects = ['Bangla', 'English', 'Math', 'Science'];
            const container = document.getElementById('exam-step-2');
            container.innerHTML = '';
            
            subjects.forEach(sub => {
                container.innerHTML += `<button class="btn-card" onclick="selectSubject('${sub}')">${sub}</button>`;
            });
        }

        function selectSubject(subject) {
            document.getElementById('exam-step-2').style.display = 'none';
            document.getElementById('exam-step-3').style.display = 'grid';
            
            document.getElementById('exam-title').innerText = "Class " + currentClass + " " + subject;
            document.getElementById('exam-subtitle').innerText = "Select Exam";
            
            const exams = examData[currentClass][subject];
            const container = document.getElementById('exam-step-3');
            container.innerHTML = '';
            
            exams.forEach(exam => {
                container.innerHTML += `<a href="${exam.link}" class="btn-card" target="_blank">${exam.name}</a>`;
            });
        }

        function goBackExam() {
            if(document.getElementById('exam-step-3').style.display === 'grid') {
                document.getElementById('exam-step-3').style.display = 'none';
                document.getElementById('exam-step-2').style.display = 'grid';
                document.getElementById('exam-title').innerText = "Class " + currentClass;
                document.getElementById('exam-subtitle').innerText = "Select Subject";
            } else if(document.getElementById('exam-step-2').style.display === 'grid') {
                resetExamFlow();
            } else {
                showPage('home');
            }
        }

        function resetExamFlow() {
            document.getElementById('exam-step-1').style.display = 'grid';
            document.getElementById('exam-step-2').style.display = 'none';
            document.getElementById('exam-step-3').style.display = 'none';
            document.getElementById('exam-title').innerText = "Take an Exam";
            document.getElementById('exam-subtitle').innerText = "Select your Class";
        }
    </script>
</body>
</html>
